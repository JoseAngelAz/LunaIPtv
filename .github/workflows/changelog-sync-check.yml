name: Changelog sync check

# If a PR changes CHANGELOG.md, it must also touch CHANGELOG_APP.md (the minimal in-app
# changelog). Prevents the two files drifting apart — CHANGELOG_APP.md is hand-maintained,
# not generated, so there is nothing to regenerate/diff; this just enforces "don't forget it".

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify CHANGELOG_APP.md was updated alongside CHANGELOG.md
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")

          if echo "$CHANGED" | grep -qx "CHANGELOG.md"; then
            if ! echo "$CHANGED" | grep -qx "CHANGELOG_APP.md"; then
              echo "::error::CHANGELOG.md changed but CHANGELOG_APP.md was not updated. Add this version's New features / Fixes to CHANGELOG_APP.md too (see CLAUDE.md)."
              exit 1
            fi
          fi
